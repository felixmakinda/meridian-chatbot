name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: meridian-chatbot-cluster

jobs:
  deploy-api:
    name: Build & deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/meridian-chatbot:$IMAGE_TAG \
            -t $REGISTRY/meridian-chatbot:latest \
            ./app
          docker push $REGISTRY/meridian-chatbot:$IMAGE_TAG
          docker push $REGISTRY/meridian-chatbot:latest

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service meridian-chatbot-svc \
            --force-new-deployment

  deploy-ui:
    name: Build & deploy UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build and push UI image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            -t $REGISTRY/meridian-chatbot-ui:$IMAGE_TAG \
            -t $REGISTRY/meridian-chatbot-ui:latest \
            ./frontend
          docker push $REGISTRY/meridian-chatbot-ui:$IMAGE_TAG
          docker push $REGISTRY/meridian-chatbot-ui:latest

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service meridian-chatbot-ui-svc \
            --force-new-deployment
