name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1

jobs:
  deploy-api:
    name: Build & deploy API (AppRunner)
    runs-on: ubuntu-latest
    environment: meridian_secrets
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/meridian-chatbot:$IMAGE_TAG \
            -t $REGISTRY/meridian-chatbot:latest \
            ./app
          docker push $REGISTRY/meridian-chatbot:$IMAGE_TAG
          docker push $REGISTRY/meridian-chatbot:latest
      # AppRunner watches ECR and redeploys automatically on new :latest push

  deploy-ui:
    name: Build & deploy UI (S3 + CloudFront)
    runs-on: ubuntu-latest
    environment: meridian_secrets
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: pnpm build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/out s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          # HTML files must not be cached long-term
          aws s3 cp frontend/out/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
